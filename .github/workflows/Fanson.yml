name: Update Fancode Playlist

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download playlist
        run: |
          curl -L https://raw.githubusercontent.com/drmlive/fancode-live-events/main/fancode.m3u -o original.m3u

      - name: Replace server
        run: |
          sed 's#in-mc-fdlive.fancode.com#in-mc-vod.fancode.com#g' original.m3u > fancode.m3u

      - name: Commit file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add fancode.m3u
          git commit -m "Updated fancode playlist" || echo "No changes"
          git push
